
[env:ykx32s_h562rg]  ; Adjust board if needed, or use custom below
platform = ststm32
board = ykx32s_h562rg
framework = arduino
upload_protocol = stlink  ; Or swd, dfu, etc.
debug_tool = stlink

; Build flags matching CubeIDE/HAL
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32H562xx  ; Your exact MCU define from stm32h562xx.h
    -Iinclude
    -Ilib/STM32H5xx_HAL_Driver/Inc
    -Ilib/STM32H5xx_HAL_Driver/Inc/Legacy

; Linker script (FLASH default)
board_build.ldscript = ld/STM32H562RGTX_FLASH.ld

; Extra linker flags from CubeIDE
board_build.linker_gc = true
board_build.ldscript_flash = ld/STM32H562RGTX_FLASH.ld
board_build.ldscript_upload = ld/STM32H562RGTX_FLASH.ld

; H5-specific optimizations
build_unflags =
    -fno-builtin  ; Avoid HAL conflicts

